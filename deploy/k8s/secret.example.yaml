# Example Secret — DO NOT commit real values.
# Copy to secret.yaml and replace the base64 placeholders, or generate with:
#   kubectl create secret generic node-server-template-secret \
#     --from-literal=DB_USERNAME=app \
#     --from-literal=DB_PASSWORD='...' \
#     --from-literal=JWT_ACCESS_SECRET='...' \
#     --from-literal=JWT_REFRESH_SECRET='...' \
#     --from-literal=REDIS_PASSWORD='...'
#
# Values below are base64-encoded placeholders (e.g. `echo -n 'app' | base64`).
apiVersion: v1
kind: Secret
metadata:
  name: node-server-template-secret
  labels:
    app.kubernetes.io/part-of: node-server-template
type: Opaque
data:
  # base64("app")
  DB_USERNAME: YXBw
  # base64("change-me-db-password")
  DB_PASSWORD: Y2hhbmdlLW1lLWRiLXBhc3N3b3Jk
  # 代码要求 JWT_ACCESS_SECRET（非 JWT_SECRET），且 >= 32 字符
  # base64("change-me-access-secret-at-least-32-chars")
  JWT_ACCESS_SECRET: Y2hhbmdlLW1lLWFjY2Vzcy1zZWNyZXQtYXQtbGVhc3QtMzItY2hhcnM=
  # base64("change-me-refresh-secret-at-least-32-chars")
  JWT_REFRESH_SECRET: Y2hhbmdlLW1lLXJlZnJlc2gtc2VjcmV0LWF0LWxlYXN0LTMyLWNoYXJz
  # base64("") — empty; set if your Redis requires auth.
  REDIS_PASSWORD: ''
