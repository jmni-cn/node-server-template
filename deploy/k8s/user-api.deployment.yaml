apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-api
  labels:
    app: user-api
    app.kubernetes.io/part-of: node-server-template
spec:
  replicas: 3
  selector:
    matchLabels:
      app: user-api
  template:
    metadata:
      labels:
        app: user-api
    spec:
      containers:
        - name: user-api
          image: node-server-template/user-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3002
          envFrom:
            - configMapRef:
                name: node-server-template-config
            - secretRef:
                name: node-server-template-secret
          env:
            - name: APP_NAME
              value: user-api
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: user-api
  labels:
    app: user-api
spec:
  selector:
    app: user-api
  ports:
    - name: http
      port: 3002
      targetPort: http
