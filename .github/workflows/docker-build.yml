name: Docker Build

on:
  push:
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        app: [admin-api, user-api, worker]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Push is gated on the REGISTRY_USERNAME secret being configured.
      # Without it the job still builds (and validates) every image.
      - name: Resolve push flag
        id: cfg
        run: |
          if [ -n "${{ secrets.REGISTRY_USERNAME }}" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to registry
        if: steps.cfg.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST || 'docker.io' }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build (and optionally push) ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.app }}
          push: ${{ steps.cfg.outputs.push == 'true' }}
          tags: |
            ${{ secrets.IMAGE_REGISTRY || 'node-server-template' }}/${{ matrix.app }}:${{ github.ref_name }}
            ${{ secrets.IMAGE_REGISTRY || 'node-server-template' }}/${{ matrix.app }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
