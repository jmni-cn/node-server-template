# ============================================================
# Redis config for dev/prod containers. Tuned for BullMQ:
# durable append-only persistence + bounded memory.
# ============================================================

# Bind inside the container network; rely on compose for isolation.
bind 0.0.0.0
protected-mode no
port 6379

# ---- persistence ----
# AOF gives the most durable option for queue state.
appendonly yes
appendfsync everysec
dir /data

# RDB snapshots as a secondary safety net.
save 900 1
save 300 10
save 60 10000

# ---- memory ----
# BullMQ relies on keys not being evicted under pressure; use noeviction so
# the queue fails loudly rather than silently dropping jobs. Raise maxmemory
# to suit the host.
maxmemory 256mb
maxmemory-policy noeviction

# ---- misc ----
timeout 0
tcp-keepalive 300
loglevel notice
