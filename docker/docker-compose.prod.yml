# ============================================================
# Production compose: the three apps + nginx reverse proxy.
#
# MySQL and Redis are external/managed services, addressed via env
# (DB_HOST / REDIS_HOST ...). No source mounts; images are prebuilt
# (set IMAGE_REGISTRY / IMAGE_TAG to pull, or build locally).
#
#   docker compose -f docker/docker-compose.prod.yml up -d
# ============================================================
name: node-server-template

services:
  admin-api:
    image: ${IMAGE_REGISTRY:-node-server-template}/admin-api:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin-api
    restart: always
    env_file:
      - ../env/admin-api.env
    expose:
      - '3001'
    depends_on:
      - user-api

  user-api:
    image: ${IMAGE_REGISTRY:-node-server-template}/user-api:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.user-api
    restart: always
    env_file:
      - ../env/user-api.env
    expose:
      - '3002'

  worker:
    image: ${IMAGE_REGISTRY:-node-server-template}/worker:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    restart: always
    env_file:
      - ../env/worker.env

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - admin-api
      - user-api
