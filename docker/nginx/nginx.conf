user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    keepalive_timeout  65;
    server_tokens off;

    # ---- gzip ----
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_vary         on;
    gzip_types        application/json application/javascript text/plain text/css text/xml;

    # ---- upstreams (compose service DNS names) ----
    upstream admin_api {
        server admin-api:3001;
        keepalive 16;
    }
    upstream user_api {
        server user-api:3002;
        keepalive 16;
    }

    server {
        listen      80;
        server_name _;

        # ---- basic security headers ----
        add_header X-Frame-Options          "SAMEORIGIN"        always;
        add_header X-Content-Type-Options   "nosniff"           always;
        add_header X-XSS-Protection          "1; mode=block"     always;
        add_header Referrer-Policy           "no-referrer-when-downgrade" always;

        client_max_body_size 10m;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # admin-api keeps its `/admin` global prefix, so proxy straight through.
        location /admin {
            proxy_pass http://admin_api;
        }

        # everything else -> user-api (routes: /auth, /sso, /users, /health).
        location / {
            proxy_pass http://user_api;
        }
    }
}
